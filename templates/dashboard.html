    // ==================== AES ENCRYPTION FOR VAULT ====================
    async function encryptData(text, password = "eagle-secure-key-2024") {
        const encoder = new TextEncoder();
        const data = encoder.encode(text);
        const keyMaterial = await crypto.subtle.importKey(
            "raw",
            encoder.encode(password.padEnd(32, "0").slice(0, 32)),
            { name: "PBKDF2" },
            false,
            ["deriveKey"]
        );
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const key = await crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt: salt,
                iterations: 100000,
                hash: "SHA-256"
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt"]
        );
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            key,
            data
        );
        const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        combined.set(salt, 0);
        combined.set(iv, salt.length);
        combined.set(new Uint8Array(encrypted), salt.length + iv.length);
        return btoa(String.fromCharCode.apply(null, combined));
    }
    
    async function decryptData(encryptedBase64, password = "eagle-secure-key-2024") {
        const combined = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
        const salt = combined.slice(0, 16);
        const iv = combined.slice(16, 28);
        const encrypted = combined.slice(28);
        const encoder = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            "raw",
            encoder.encode(password.padEnd(32, "0").slice(0, 32)),
            { name: "PBKDF2" },
            false,
            ["deriveKey"]
        );
        const key = await crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt: salt,
                iterations: 100000,
                hash: "SHA-256"
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["decrypt"]
        );
        const decrypted = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            key,
            encrypted
        );
        return new TextDecoder().decode(decrypted);
    }

    // ==================== VAULT FUNCTIONS (Cloud Sync) ====================
    async function saveToVault(label, content, isFile = false, fileName = null, fileType = null, fileBase64 = null) {
        if (!label) {
            alert("Please enter a label/title");
            return;
        }
        
        let dataToEncrypt;
        let itemType = "text";
        let originalName = null;
        let mimeType = null;
        let itemId = Date.now();
        
        if (isFile && fileBase64) {
            dataToEncrypt = JSON.stringify({
                type: "file",
                fileName: fileName,
                mimeType: fileType,
                base64: fileBase64
            });
            itemType = fileType ? (fileType.startsWith("image/") ? "image" : (fileType === "application/pdf" ? "pdf" : "file")) : "file";
            originalName = fileName;
            mimeType = fileType;
        } else {
            dataToEncrypt = JSON.stringify({
                type: "text",
                content: content
            });
            itemType = "text";
        }
        
        const encrypted = await encryptData(dataToEncrypt);
        
        try {
            await cloudVaultSave(label, encrypted, itemType, originalName, mimeType, itemId);
            updateSyncStatus("Saved to cloud ✓", true);
            await renderVault();
        } catch (err) {
            console.error("Cloud save error:", err);
            updateSyncStatus("Sync failed!", false);
            alert("Failed to save to cloud. Check connection.");
        }
    }

    // ==================== AUDIO RECORDING ====================
    async function startRecording() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => {
                    currentAudioBase64 = reader.result;
                    currentAudioDuration = Math.floor((Date.now() - recordingStartTime) / 1000);
                    document.getElementById("audioPreview").style.display = "block";
                    document.getElementById("audioPreview").innerHTML = `🎤 Secure Audio captured (${currentAudioDuration}s) - Will self-destruct after 15min`;
                    document.getElementById("micBtn").classList.remove("recording");
                };
                reader.readAsDataURL(audioBlob);
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            isRecording = true;
            recordingStartTime = Date.now();
            document.getElementById("micBtn").classList.add("recording");
            document.getElementById("recordingTimer").style.display = "block";
            document.getElementById("audioVisualizer").style.display = "block";
            
            recordingInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                const remaining = 60 - elapsed;
                document.getElementById("recordingTimer").textContent = `${Math.floor(remaining / 60)}:${(remaining % 60).toString().padStart(2, '0')}`;
                const progressPercent = (elapsed / 60) * 100;
                document.getElementById("audioProgress").style.width = `${progressPercent}%`;
                
                if (elapsed >= 60) {
                    stopRecording();
                }
            }, 100);
        } catch (err) {
            console.error("Microphone error:", err);
            alert("Microphone access denied or not available");
        }
    }
    
    function stopRecording() {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            clearInterval(recordingInterval);
            document.getElementById("recordingTimer").style.display = "none";
            document.getElementById("audioVisualizer").style.display = "none";
            document.getElementById("recordingTimer").textContent = "0:00";
            document.getElementById("audioProgress").style.width = "0%";
        }
    }

    async function apiRequest(endpoint, method, body = null) {
        const headers = {
            "X-API-Key": API_KEY,
            "Content-Type": "application/json"
        };
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        
        const response = await fetch(`${SERVER_URL}${endpoint}`, options);
        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${response.status}`);
        }
        return response.json();
    }

    // ==================== LIVE CYBER ATTACK MAP ====================
    function initCyberMap(canvasId = "cyberCanvas", alertId = "alertStatus") {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        canvas.width = width;
        canvas.height = height;
        
        let nodes = [];
        let threats = [];
        
        for (let i = 0; i < 25; i++) {
            nodes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 4 + 2,
                color: '#0f0'
            });
        }
        
        function draw() {
            if (!ctx) return;
            ctx.fillStyle = '#010a12';
            ctx.fillRect(0, 0, width, height);
            
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 60) {
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }
            
            for (let node of nodes) {
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = node.color;
                ctx.fill();
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#0ff';
            }
            
            for (let threat of threats) {
                ctx.beginPath();
                ctx.moveTo(threat.fromX, threat.fromY);
                ctx.lineTo(threat.toX, threat.toY);
                ctx.strokeStyle = threat.type === 'attack' ? '#f00' : '#0f0';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                threat.progress += 0.02;
                if (threat.progress >= 1) {
                    threat.progress = 0;
                    threat.fromX = nodes[Math.floor(Math.random() * nodes.length)].x;
                    threat.fromY = nodes[Math.floor(Math.random() * nodes.length)].y;
                    threat.toX = nodes[Math.floor(Math.random() * nodes.length)].x;
                    threat.toY = nodes[Math.floor(Math.random() * nodes.length)].y;
                    threat.type = Math.random() > 0.7 ? 'attack' : 'defense';
                    
                    const alertDiv = document.getElementById(alertId);
                    if (alertDiv) {
                        if (threat.type === 'attack') {
                            alertDiv.innerHTML = '🔴 THREAT DETECTED: ACTIVE INTRUSION';
                            alertDiv.style.color = '#f44';
                        } else {
                            alertDiv.innerHTML = '🟢 SECURE: THREAT CONTAINED';
                            alertDiv.style.color = '#4f4';
                        }
                    }
                    
                    const targetNode = nodes.find(n => Math.abs(n.x - threat.toX) < 10 && Math.abs(n.y - threat.toY) < 10);
                    if (targetNode) {
                        targetNode.color = threat.type === 'attack' ? '#f00' : '#0f0';
                        setTimeout(() => { targetNode.color = '#0ff'; }, 500);
                    }
                }
            }
            
            requestAnimationFrame(draw);
        }
        
        for (let i = 0; i < 5; i++) {
            threats.push({
                fromX: nodes[Math.floor(Math.random() * nodes.length)].x,
                fromY: nodes[Math.floor(Math.random() * nodes.length)].y,
                toX: nodes[Math.floor(Math.random() * nodes.length)].x,
                toY: nodes[Math.floor(Math.random() * nodes.length)].y,
                progress: Math.random(),
                type: Math.random() > 0.7 ? 'attack' : 'defense'
            });
        }
        
        draw();
        
        setInterval(() => {
            const randomNode = nodes[Math.floor(Math.random() * nodes.length)];
            randomNode.color = '#fa0';
            setTimeout(() => { randomNode.color = '#0ff'; }, 300);
        }, 800);
    }

    // ==================== FILE CLOAKER ====================
    function setupFileCloaker(dropZoneId = "dropZone", fileInfoId = "fileInfo", fileInputId = "fileInput") {
        const dropZone = document.getElementById(dropZoneId);
        const fileInput = document.getElementById(fileInputId);
        const fileInfo = document.getElementById(fileInfoId);
        if (!dropZone) return;
        
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            const cloaker = dropZone.closest('.file-cloaker');
            if (cloaker) cloaker.classList.add('drag-over');
        });
        
        dropZone.addEventListener('dragleave', () => {
            const cloaker = dropZone.closest('.file-cloaker');
            if (cloaker) cloaker.classList.remove('drag-over');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            const cloaker = dropZone.closest('.file-cloaker');
            if (cloaker) cloaker.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) processFile(file, fileInfo);
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) processFile(e.target.files[0], fileInfo);
        });
    }
    
    function processFile(file, fileInfoElement) {
        const maxSize = 5 * 1024 * 1024;
        if (file.size > maxSize) {
            alert('File too large. Maximum 5MB.');
            return;
        }
        
        currentAttachmentName = file.name;
        currentAttachmentType = file.type;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            currentAttachmentBase64 = e.target.result;
            fileInfoElement.style.display = 'block';
            fileInfoElement.innerHTML = `
                📎 ${currentAttachmentName}<br>
                <span style="font-size: 9px;">${(file.size / 1024).toFixed(1)} KB (Cloaked)</span>
                <button class="clear-attachment" id="clearAttachmentBtn">Clear</button>
            `;
            document.getElementById('clearAttachmentBtn')?.addEventListener('click', () => {
                currentAttachmentBase64 = null;
                currentAttachmentName = null;
                currentAttachmentType = null;
                fileInfoElement.style.display = 'none';
                fileInfoElement.innerHTML = '';
            });
        };
        reader.readAsDataURL(file);
    }

    // ==================== DATA FRAGMENT ANIMATION ====================
    function createDataFragments() {
        const overlay = document.createElement('div');
        overlay.className = 'fragment-overlay';
        document.body.appendChild(overlay);
        
        const button = document.getElementById('sendBtn');
        const buttonRect = button.getBoundingClientRect();
        const targetInput = document.getElementById('targetId');
        const targetRect = targetInput.getBoundingClientRect();
        
        const message = document.getElementById('messageText').value;
        const fragments = message.split('').concat(Math.random().toString(36).substring(2, 10).split(''));
        
        for (let i = 0; i < 100; i++) {
            const fragment = document.createElement('div');
            fragment.className = 'data-fragment';
            const randomChar = fragments[Math.floor(Math.random() * fragments.length)] || Math.random().toString(36).substring(7);
            fragment.textContent = randomChar;
            
            const startX = buttonRect.left + (Math.random() * buttonRect.width);
            const startY = buttonRect.top + (Math.random() * buttonRect.height);
            fragment.style.left = startX + 'px';
            fragment.style.top = startY + 'px';
            
            const deltaX = targetRect.left + (Math.random() * 100) - startX;
            const deltaY = targetRect.top + (Math.random() * 50) - startY;
            fragment.style.setProperty('--tx', deltaX + 'px');
            fragment.style.setProperty('--ty', deltaY + 'px');
            
            fragment.style.animationDelay = (Math.random() * 0.3) + 's';
            fragment.style.fontSize = (Math.random() * 8 + 6) + 'px';
            
            overlay.appendChild(fragment);
        }
        
        setTimeout(() => {
            overlay.remove();
        }, 1000);
    }

    // ==================== EPHEMERAL MESSAGE WITH COUNTDOWN ====================
    function addMessageToHub(senderId, content, timestamp, attachmentBase64 = null, attachmentName = null, attachmentType = null, audioBase64 = null, audioDuration = null) {
        const hub = document.getElementById("msgHub");
        const msgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        
        const msgDiv = document.createElement("div");
        msgDiv.id = msgId;
        msgDiv.className = "msg-card";
        
        let attachmentHtml = '';
        if (attachmentBase64) {
            const isImage = attachmentType && attachmentType.startsWith("image/");
            const isPdf = attachmentType === "application/pdf";
            attachmentHtml = `
                <div style="margin-top: 8px;">
                    <button class="download-attachment-btn" data-base64="${attachmentBase64}" data-name="${attachmentName || 'file'}" data-type="${attachmentType || 'application/octet-stream'}">
                        💾 ${translations[currentLanguage].download}
                    </button>
                    ${(isImage || isPdf) ? `<button class="view-file-btn" data-base64="${attachmentBase64}" data-type="${attachmentType}" data-name="${attachmentName || 'file'}">
                        👁️ ${translations[currentLanguage].view}
                    </button>` : ''}
                </div>
            `;
        }
        
        let audioHtml = '';
        if (audioBase64) {
            audioHtml = `
                <div style="margin-top: 8px;">
                    <button class="play-audio-btn" data-audio="${audioBase64}">
                        🎤 ${translations[currentLanguage].audio} (${audioDuration || 0}s)
                    </button>
                </div>
            `;
        }
        
        msgDiv.innerHTML = `
            <div class="sender-only">
                📨 ${translations[currentLanguage].from}: ${senderId}
                <span class="countdown-timer">${translations[currentLanguage].expiresIn}: 15:00</span>
            </div>
            <div class="full-message">
                <strong>📝 ${translations[currentLanguage].clickToReveal}:</strong><br>
                <span class="message-content">${escapeHtml(content)}</span>
                ${attachmentHtml}
                ${audioHtml}
                <br><small>🕒 ${new Date(timestamp).toLocaleString()}</small>
            </div>
        `;
        
        let revealed = false;
        let timeLeft = 900;
        let timerInterval = null;
        
        msgDiv.addEventListener('click', (e) => {
            if (e.target.closest('.full-message') || e.target.classList.contains('download-attachment-btn') || e.target.classList.contains('play-audio-btn') || e.target.classList.contains('view-file-btn')) return;
            
            if (!revealed) {
                msgDiv.classList.add('expanded');
                revealed = true;
                
                const timerSpan = msgDiv.querySelector('.countdown-timer');
                
                timerInterval = setInterval(() => {
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        if (activeTimers.has(msgId)) activeTimers.delete(msgId);
                        msgDiv.style.opacity = '0';
                        msgDiv.style.transform = 'translateX(-20px)';
                        setTimeout(() => {
                            if (msgDiv.parentNode) msgDiv.remove();
                        }, 300);
                    } else {
                        timeLeft--;
                        const minutes = Math.floor(timeLeft / 60);
                        const seconds = timeLeft % 60;
                        timerSpan.textContent = `${translations[currentLanguage].expiresIn}: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                        if (timeLeft <= 60) {
                            timerSpan.style.background = 'rgba(255, 0, 0, 0.6)';
                            timerSpan.style.animation = 'pulse 1s infinite';
                        }
                    }
                }, 1000);
                activeTimers.set(msgId, timerInterval);
            }
        });
        
        msgDiv.querySelectorAll('.download-attachment-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const base64Data = btn.getAttribute('data-base64');
                const fileName = btn.getAttribute('data-name');
                const link = document.createElement('a');
                link.href = base64Data;
                link.download = fileName || 'secure_attachment';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        });
        
        msgDiv.querySelectorAll('.view-file-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const base64Data = btn.getAttribute('data-base64');
                const fileType = btn.getAttribute('data-type');
                const fileName = btn.getAttribute('data-name');
                openViewer(base64Data, fileType, fileName);
            });
        });
        
        msgDiv.querySelectorAll('.play-audio-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const audioData = btn.getAttribute('data-audio');
                const audio = new Audio(audioData);
                audio.play().catch(err => console.warn("Audio play failed:", err));
            });
        });
        
        if (hub.children.length === 1 && hub.children[0].innerText.includes("SYSTEM READY")) {
            hub.innerHTML = '';
        }
        
        hub.prepend(msgDiv);
        
        while (hub.children.length > 50) {
            const oldest = hub.lastChild;
            if (oldest && activeTimers.has(oldest.id)) {
                clearInterval(activeTimers.get(oldest.id));
                activeTimers.delete(oldest.id);
            }
            hub.removeChild(oldest);
        }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function authenticateNode(nodeId) {
        const errorDiv = document.getElementById("loginError");
        errorDiv.innerText = "";
        
        try {
            const result = await apiRequest("/api/authorize", "POST", { node_id: nodeId });
            if (result.authorized) {
                currentNodeId = nodeId;
                document.getElementById("activeNodeBadge").innerHTML = `NODE: ${currentNodeId}`;
                const mobileBadge = document.getElementById("mobileNodeBadge");
                if (mobileBadge) mobileBadge.innerHTML = `NODE: ${currentNodeId}`;
                document.getElementById("loginModal").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                startPolling();
                fetchMessages();
                initCyberMap("cyberCanvas", "alertStatus");
                initCyberMap("mobileCyberCanvas", "mobileAlertStatus");
                setupFileCloaker("dropZone", "fileInfo", "fileInput");
                setupFileCloaker("mobileDropZone", "mobileFileInfo", "fileInput");
                await renderVault(); // Load cloud vault
                return true;
            } else {
                errorDiv.innerText = translations[currentLanguage].authFail;
                return false;
            }
        } catch (err) {
            errorDiv.innerText = err.message;
            return false;
        }
    }

    async function sendMessage() {
        if (!currentNodeId) {
            alert("Session expired. Relogin required.");
            return;
        }
        
        const targetId = document.getElementById("targetId").value.trim();
        const messageText = document.getElementById("messageText").value.trim();
        
        if (!targetId || !messageText) {
            alert("Target Node ID and Message cannot be empty.");
            return;
        }
        
        try {
            const payload = {
                sender_id: currentNodeId,
                target_id: targetId,
                message: messageText
            };
            
            if (currentAttachmentBase64) {
                payload.attachment = currentAttachmentBase64;
                payload.attachment_name = currentAttachmentName;
                payload.attachment_type = currentAttachmentType;
            }
            
            if (currentAudioBase64) {
                payload.audio_attachment = currentAudioBase64;
                payload.audio_duration = currentAudioDuration;
            }
            
            await apiRequest("/api/send", "POST", payload);
            
            createDataFragments();
            
            const hub = document.getElementById("msgHub");
            const successMsg = document.createElement("div");
            successMsg.className = "msg-card";
            successMsg.style.borderLeftColor = "#0f0";
            successMsg.innerHTML = `✅ ${translations[currentLanguage].sendSuccess} → ${targetId}`;
            hub.prepend(successMsg);
            
            setTimeout(() => {
                successMsg.style.opacity = '0';
                setTimeout(() => successMsg.remove(), 300);
            }, 3000);
            
            document.getElementById("messageText").value = "";
            currentAttachmentBase64 = null;
            currentAttachmentName = null;
            currentAttachmentType = null;
            currentAudioBase64 = null;
            currentAudioDuration = 0;
            
            const fileInfo = document.getElementById('fileInfo');
            if (fileInfo) {
                fileInfo.style.display = 'none';
                fileInfo.innerHTML = '';
            }
            const mobileFileInfo = document.getElementById('mobileFileInfo');
            if (mobileFileInfo) {
                mobileFileInfo.style.display = 'none';
                mobileFileInfo.innerHTML = '';
            }
            const audioPreview = document.getElementById('audioPreview');
            if (audioPreview) {
                audioPreview.style.display = 'none';
                audioPreview.innerHTML = '';
            }
            
        } catch (err) {
            alert(`${translations[currentLanguage].sendFail}: ${err.message}`);
        }
    }

    async function fetchMessages() {
        if (!currentNodeId) return;
        try {
            const data = await apiRequest(`/api/receive/${currentNodeId}`, "GET");
            const messages = data.messages || [];
            
            for (let msg of messages) {
                addMessageToHub(
                    msg.from, 
                    msg.content, 
                    msg.timestamp,
                    msg.attachment || null,
                    msg.attachment_name || null,
                    msg.attachment_type || null,
                    msg.audio_attachment || null,
                    msg.audio_duration || null
                );
            }
        } catch (err) {
            console.warn("Polling error:", err);
        }
    }

    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(() => {
            fetchMessages();
            updateMetrics();
        }, 2000);
    }

    function updateMetrics() {
        const cpu = Math.floor(Math.random() * 40) + 15;
        const latency = Math.floor(Math.random() * 80) + 12;
        const speed = (Math.random() * 90 + 45).toFixed(1);
        document.getElementById("cpuMetric").innerText = `${cpu}%`;
        document.getElementById("latencyMetric").innerText = `${latency}ms`;
        document.getElementById("speedMetric").innerText = `${speed} Mbps`;
        
        const threats = ["🔍 SCANNING", "⚠️ LOW THREAT", "🛡️ ACTIVE DEFENSE", "📡 SIGNAL MASKED", "✅ SECURE CHANNEL", "🦅 EAGLE EYE ACTIVE"];
        document.getElementById("threatMsg").innerHTML = `🛰️ ${threats[Math.floor(Math.random()*threats.length)]}`;
    }

    function showLanguageSwitcher() {
        const langOptions = { en: 'English', so: 'Somali', it: 'Italian' };
        const selected = prompt(`Select language / Dooro luqad / Seleziona lingua:\n1. English\n2. Somali\n3. Italian`, "1");
        if (selected === "1") currentLanguage = "en";
        else if (selected === "2") currentLanguage = "so";
        else if (selected === "3") currentLanguage = "it";
        updateUITexts();
        alert(`Language changed to ${langOptions[currentLanguage]}`);
    }

    // ==================== MOBILE DRAWER ====================
    function initMobileDrawer() {
        const toggle = document.getElementById('mobileDrawerToggle');
        const drawer = document.getElementById('mobileDrawer');
        const overlay = document.getElementById('mobileDrawerOverlay');
        const closeBtn = document.getElementById('mobileClose');
        
        if (toggle) {
            toggle.addEventListener('click', () => {
                drawer.classList.add('open');
                overlay.classList.add('open');
            });
        }
        
        const closeDrawer = () => {
            drawer.classList.remove('open');
            overlay.classList.remove('open');
        };
        
        if (closeBtn) closeBtn.addEventListener('click', closeDrawer);
        if (overlay) overlay.addEventListener('click', closeDrawer);
    }

    // ==================== VAULT FILE UPLOAD HANDLERS ====================
    function setupVaultFileUpload(vaultFileInputId, fileInfoDivId, isMobile = false) {
        const fileInput = document.getElementById(vaultFileInputId);
        const fileInfoDiv = document.getElementById(fileInfoDivId);
        
        if (!fileInput) return;
        
        fileInput.addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const maxSize = 10 * 1024 * 1024;
            if (file.size > maxSize) {
                alert("File too large. Maximum 10MB for vault storage.");
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async function(evt) {
                const base64Data = evt.target.result;
                const label = isMobile ? document.getElementById("mobileVaultLabel").value.trim() : document.getElementById("vaultLabel").value.trim();
                
                if (!label) {
                    alert("Please enter a label for this file first");
                    return;
                }
                
                await saveToVault(label, null, true, file.name, file.type, base64Data);
                
                if (isMobile) {
                    document.getElementById("mobileVaultLabel").value = "";
                    document.getElementById("mobileVaultFileInfo").innerHTML = "";
                } else {
                    document.getElementById("vaultLabel").value = "";
                    document.getElementById("vaultFileInfo").innerHTML = "";
                }
                fileInput.value = "";
            };
            reader.readAsDataURL(file);
            
            if (fileInfoDiv) {
                fileInfoDiv.innerHTML = `📎 Selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
                setTimeout(() => {
                    if (fileInfoDiv) fileInfoDiv.innerHTML = "";
                }, 3000);
            }
        });
    }

    // ==================== EVENT LISTENERS ====================
    document.getElementById("loginBtn").addEventListener("click", () => {
        const nodeInput = document.getElementById("nodeIdInput").value.trim();
        if (!nodeInput) {
            document.getElementById("loginError").innerText = "Please enter a Node ID";
            return;
        }
        authenticateNode(nodeInput);
    });

    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("toolsSettingsBtn").addEventListener("click", showLanguageSwitcher);
    document.getElementById("mobileToolsBtn")?.addEventListener("click", showLanguageSwitcher);
    
    document.getElementById("micBtn").addEventListener("click", () => {
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    });
    
    // Viewer close
    document.getElementById("viewerClose").addEventListener("click", closeViewer);
    document.getElementById("viewerModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("viewerModal")) closeViewer();
    });
    
    // Vault Text Save
    document.getElementById("vaultSaveTextBtn").addEventListener("click", async () => {
        const label = document.getElementById("vaultLabel").value.trim();
        const content = document.getElementById("vaultContent").value.trim();
        if (label && content) {
            await saveToVault(label, content, false);
            document.getElementById("vaultLabel").value = "";
            document.getElementById("vaultContent").value = "";
        } else {
            alert("Please enter both a label and content");
        }
    });
    
    // Vault File Upload
    document.getElementById("vaultUploadBtn").addEventListener("click", () => {
        document.getElementById("vaultFileInput").click();
    });
    
    // Mobile Vault Text Save
    document.getElementById("mobileVaultSaveTextBtn")?.addEventListener("click", async () => {
        const label = document.getElementById("mobileVaultLabel").value.trim();
        const content = document.getElementById("mobileVaultContent").value.trim();
        if (label && content) {
            await saveToVault(label, content, false);
            document.getElementById("mobileVaultLabel").value = "";
            document.getElementById("mobileVaultContent").value = "";
        } else {
            alert("Please enter both a label and content");
        }
    });
    
    // Mobile Vault File Upload
    document.getElementById("mobileVaultUploadBtn")?.addEventListener("click", () => {
        document.getElementById("mobileVaultFileInput").click();
    });

    document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
            currentLanguage = e.target.getAttribute("data-lang");
            updateUITexts();
        });
    });

    updateUITexts();
    initMobileDrawer();
    setupVaultFileUpload("vaultFileInput", "vaultFileInfo", false);
    setupVaultFileUpload("mobileVaultFileInput", "mobileVaultFileInfo", true);
    
    document.getElementById("nodeIdInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
    });
</script>
